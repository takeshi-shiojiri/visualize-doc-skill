<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 700"
     width="800" height="700"
     role="img" aria-labelledby="diagram-title diagram-desc"
     style="font-family: 'Noto Sans CJK JP', 'Hiragino Sans', 'Yu Gothic', 'sans-serif';">
  <title id="diagram-title">ポジショニングマップ</title>
  <desc id="diagram-desc">2軸上の相対位置</desc>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#D5D8DC" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10"
            refX="8" refY="5" orient="auto-start-reverse">
      <polygon points="0 0, 10 5, 0 10" fill="#636E72"/>
    </marker>
  </defs>
  <rect width="800" height="700" fill="#F5F7FA" rx="0"/>
  <text x="400.0" y="45" text-anchor="middle" font-size="28px" font-weight="bold" fill="#2D3436" dominant-baseline="central">CRMツール ポジショニングマップ</text>
  <text x="400.0" y="72" text-anchor="middle" font-size="18px"  fill="#636E72" dominant-baseline="central">価格帯 × 機能の豊富さで比較</text>
  <line x1="120" y1="580" x2="700" y2="580" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="580" x2="120" y2="140" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="410.0" y="615" text-anchor="middle" font-size="14px" font-weight="bold" fill="#2D3436">価格帯 →</text>
  <text x="85" y="360.0" text-anchor="middle" font-size="14px" font-weight="bold" fill="#2D3436" transform="rotate(-90,85,360.0)">機能の豊富さ →</text>
  <circle cx="236.0" cy="448.0" r="22" fill="#74B9FF" opacity="0.2" stroke="#74B9FF" stroke-width="2"/>
  <circle cx="236.0" cy="448.0" r="5" fill="#74B9FF"/>
  <text x="236.0" y="420.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールA</text>
  <text x="236.0" y="483.0" text-anchor="middle" font-size="10px" fill="#95A5A6">無料/シンプル</text>
  <circle cx="352.0" cy="316.0" r="22" fill="#00B894" opacity="0.2" stroke="#00B894" stroke-width="2"/>
  <circle cx="352.0" cy="316.0" r="5" fill="#00B894"/>
  <text x="352.0" y="288.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールB</text>
  <text x="352.0" y="351.0" text-anchor="middle" font-size="10px" fill="#95A5A6">中価格/バランス型</text>
  <circle cx="555.0" cy="206.0" r="22" fill="#A29BFE" opacity="0.2" stroke="#A29BFE" stroke-width="2"/>
  <circle cx="555.0" cy="206.0" r="5" fill="#A29BFE"/>
  <text x="555.0" y="178.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールC</text>
  <text x="555.0" y="241.0" text-anchor="middle" font-size="10px" fill="#95A5A6">高価格/多機能</text>
  <circle cx="468.0" cy="404.0" r="22" fill="#FDCB6E" opacity="0.2" stroke="#FDCB6E" stroke-width="2"/>
  <circle cx="468.0" cy="404.0" r="5" fill="#FDCB6E"/>
  <text x="468.0" y="376.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールD</text>
  <text x="468.0" y="439.0" text-anchor="middle" font-size="10px" fill="#95A5A6">中高/特化型</text>
  <circle cx="613.0" cy="338.0" r="22" fill="#FF7675" opacity="0.2" stroke="#FF7675" stroke-width="2"/>
  <circle cx="613.0" cy="338.0" r="5" fill="#FF7675"/>
  <text x="613.0" y="310.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールE</text>
  <text x="613.0" y="373.0" text-anchor="middle" font-size="10px" fill="#95A5A6">高価格/レガシー</text>
  <circle cx="294.0" cy="250.0" r="22" fill="#FD79A8" opacity="0.2" stroke="#FD79A8" stroke-width="2"/>
  <circle cx="294.0" cy="250.0" r="5" fill="#FD79A8"/>
  <text x="294.0" y="222.0" text-anchor="middle" font-size="13px" font-weight="bold" fill="#2D3436">ツールF</text>
  <text x="294.0" y="285.0" text-anchor="middle" font-size="10px" fill="#95A5A6">低価格/高機能</text>
  <rect x="60" y="635" width="680" height="50" rx="8" fill="#E8F8F5" stroke="#00B894" stroke-width="2"/>
  <text x="400.0" y="660.0" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">✦ 右上が高価格×多機能。自社ポジションの空白地帯を探す</text>
