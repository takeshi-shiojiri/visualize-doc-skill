  <text x="475.99999999999994" y="281.7" text-anchor="middle" font-size="12px"  fill="#95A5A6" dominant-baseline="central">取消</text>
  <path d="M 531.3 264.2 L 555.3 264.2 Q 563.3 264.2 563.3 256.2 L 563.3 235.2 Q 563.3 227.2 571.3 227.2 L 595.3 227.2" fill="none" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="563.3" y="235.7" text-anchor="middle" font-size="12px"  fill="#95A5A6" dominant-baseline="central">出荷</text>
