  <ellipse cx="659.2" cy="319.2" rx="60.0" ry="22.0" fill="#FF7675" filter="url(#shadow)"/>
  <text x="659.2" y="319.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#FFFFFF" dominant-baseline="central">キャンセル</text>
  <ellipse cx="1031.1" cy="264.2" rx="60.0" ry="22.0" fill="#FF7675" filter="url(#shadow)"/>
  <text x="1031.1" y="264.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#FFFFFF" dominant-baseline="central">返品</text>
  <rect x="60" y="401.2" width="1031.1" height="50" rx="8" fill="#E8F8F5" stroke="#00B894" stroke-width="2"/>
  <text x="575.55" y="426.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">✦ キャンセルは発送前まで可能、返品は配達後7日以内</text>
