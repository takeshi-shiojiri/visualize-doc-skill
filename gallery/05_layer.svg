<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 951.2"
     width="1000" height="951.2"
     role="img" aria-labelledby="diagram-title diagram-desc"
     style="font-family: 'Noto Sans CJK JP', 'Hiragino Sans', 'Yu Gothic', 'sans-serif';">
  <title id="diagram-title">Webアプリケーション アーキテクチャ</title>
  <desc id="diagram-desc">4層構成のモダンWebスタック</desc>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#D5D8DC" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10"
            refX="8" refY="5" orient="auto-start-reverse">
      <polygon points="0 0, 10 5, 0 10" fill="#636E72"/>
    </marker>
  </defs>
  <rect width="1000" height="951.2" fill="#F5F7FA" rx="0"/>
  <text x="500.0" y="76.8" text-anchor="middle" font-size="28px" font-weight="bold" fill="#2D3436" dominant-baseline="central">Webアプリケーション アーキテクチャ</text>
  <text x="500.0" y="116.39999999999999" text-anchor="middle" font-size="18px"  fill="#636E72" dominant-baseline="central">4層構成のモダンWebスタック</text>
  <rect x="126.0" y="187.2" width="748.0" height="124" rx="8" fill="#EBF5FB" stroke="#74B9FF" stroke-width="2" filter="url(#shadow)"/>
  <text x="500.0" y="211.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#2D3436" dominant-baseline="central">フロントエンド層</text>
  <text x="500.0" y="240.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">Next.js (App Router)</text>
  <text x="500.0" y="262.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">TailwindCSS + Radix UI</text>
  <text x="500.0" y="284.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">React Query (データフェッチ)</text>
  <line x1="500.0" y1="351.2" x2="500.0" y2="311.2" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="126.0" y="351.2" width="748.0" height="124" rx="8" fill="#E8F8F5" stroke="#00B894" stroke-width="2" filter="url(#shadow)"/>
  <text x="500.0" y="375.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#2D3436" dominant-baseline="central">API層</text>
  <text x="500.0" y="404.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">FastAPI (REST API)</text>
  <text x="500.0" y="426.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">認証: Auth0 + JWT</text>
  <text x="500.0" y="448.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">OpenAPI仕様で型安全</text>
  <line x1="500.0" y1="515.2" x2="500.0" y2="475.2" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="126.0" y="515.2" width="748.0" height="124" rx="8" fill="#FEF9E7" stroke="#FDCB6E" stroke-width="2" filter="url(#shadow)"/>
  <text x="500.0" y="539.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#2D3436" dominant-baseline="central">データ層</text>
  <text x="500.0" y="568.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">PostgreSQL (メインDB)</text>
  <text x="500.0" y="590.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">Redis (キャッシュ/セッション)</text>
  <text x="500.0" y="612.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">S3 (オブジェクトストレージ)</text>
  <line x1="500.0" y1="679.2" x2="500.0" y2="639.2" stroke="#636E72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="126.0" y="679.2" width="748.0" height="102" rx="8" fill="#FDEDEC" stroke="#FF7675" stroke-width="2" filter="url(#shadow)"/>
  <text x="500.0" y="703.2" text-anchor="middle" font-size="16px" font-weight="bold" fill="#2D3436" dominant-baseline="central">インフラ層</text>
  <text x="500.0" y="732.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">AWS (ECS, RDS, S3, CloudFront)</text>
  <text x="500.0" y="754.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">Terraform IaC, GitHub Actions CI/CD</text>
  <rect x="60" y="841.2" width="880" height="50" rx="8" fill="#E8F8F5" stroke="#00B894" stroke-width="2"/>
  <text x="500.0" y="866.2" text-anchor="middle" font-size="14px"  fill="#2D3436" dominant-baseline="central">✦ 各層は独立してスケール・デプロイ可能な設計</text>
</svg>